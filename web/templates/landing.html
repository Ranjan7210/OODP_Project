<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Bus Route Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/landing.css') }}">
</head>
<body>

    <!-- TOP SECTION: WHITE BACKGROUND -->
    <div class="top-section">
        <div class="grid-texture"></div>
        <div class="container relative">
            
            <!-- HEADER -->
            <header class="header">
                <div class="logo">CITYFLOW</div>
                <nav class="nav-links">
                    <a href="{{ url_for('citizen_home') }}">CITIZEN PORTAL</a>
                    <a href="{{ url_for('admin_dashboard') }}" class="admin-link">ADMIN PORTAL</a>
                </nav>
                <a href="#" class="btn-contact">CONTACT US</a>
            </header>

            <!-- HERO -->
            <div class="hero">
                <div class="hero-content">
                    <div class="subtitle">Managing Your Routes Nationwide</div>
                    <h1 class="main-title">CITY BUS NETWORK</h1>
                    
                    <div class="stats-row">
                        <div class="stat-item">
                            <div class="stat-number">$300M</div>
                            <div class="stat-label">Active Routes</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">$20B</div>
                            <div class="stat-label">Active Buses</div>
                        </div>
                    </div>

                    <a href="{{ url_for('citizen_routes') }}" class="btn-orange">
                        VIEW ROUTES <i class="fa-solid fa-arrow-right"></i>
                    </a>

                    <div class="social-proof">
                        <div class="avatars">
                            <img src="https://i.pravatar.cc/100?img=1" alt="Passenger">
                            <img src="https://i.pravatar.cc/100?img=2" alt="Passenger">
                            <img src="https://i.pravatar.cc/100?img=3" alt="Passenger">
                            <div class="avatar-more">+</div>
                        </div>
                        <div class="proof-text">50K+ PASSENGERS</div>
                    </div>
                </div>

                <div class="hero-visual">
                    <button class="down-arrow-btn"><i class="fa-solid fa-arrow-down"></i></button>
                    <!-- Main visual image generated by the AI -->
                    <img src="{{ url_for('static', filename='img/main_visual.png') }}" alt="City Route Vehicle" class="main-image">
                </div>
            </div>
        </div>
    </div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Entrance Animations using GSAP
        document.addEventListener("DOMContentLoaded", () => {
            const tl = gsap.timeline({ defaults: { ease: "power3.out" } });

            // Animate Header
            tl.fromTo(".header", 
                { y: -30, opacity: 0 },
                { y: 0, opacity: 1, duration: 1 }
            )
            // Stagger hero text content
            .fromTo([".subtitle", ".main-title", ".stats-row", ".btn-orange", ".social-proof"],
                { y: 40, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.8, stagger: 0.15 },
                "-=0.5" // overlap
            )
            // Slide and scale in main vehicle image
            .fromTo(".main-image",
                { scale: 0.9, opacity: 0, x: 50 },
                { scale: 1, opacity: 1, x: 0, duration: 1.2 },
                "-=0.8"
            )
            // Pop in arrow button
            .fromTo(".down-arrow-btn",
                { scale: 0, opacity: 0 },
                { scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.7)" },
                "-=0.6"
            );
        });
    </script>
</body>
</html>
